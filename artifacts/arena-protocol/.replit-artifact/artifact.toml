kind = "web"
previewPath = "/"
title = "Arena Protocol"
version = "1.0.0"
id = "artifacts/arena-protocol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20450
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/arena-protocol run dev"

[services.env]
PORT = "20450"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/arena-protocol", "run", "build"]
publicDir = "artifacts/arena-protocol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
